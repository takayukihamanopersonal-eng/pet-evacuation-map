<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペット同行避難所マップ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --white:#fff; --bg:#f5f7fa; --border:#e8ecf0;
  --text:#1a2332; --text2:#6b7a8d; --text3:#9aa8b8;
  --blue:#2563eb; --blue-d:#1d4ed8; --blue-l:#eff6ff;
  --green:#16a34a; --green-l:#f0fdf4;
  --amber:#d97706; --amber-l:#fffbeb;
  --red:#dc2626; --red-l:#fef2f2;
  --purple:#7c3aed; --purple-l:#faf5ff;
  --sh:0 4px 20px rgba(0,0,0,.09);
  --sh-lg:0 12px 40px rgba(0,0,0,.13);
}
html,body { height:100%; font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }

.app { display:flex; flex-direction:column; height:100vh; }

/* ── TOPBAR ── */
.topbar {
  background:var(--white); border-bottom:1px solid var(--border);
  padding:10px 16px; display:flex; flex-direction:column; gap:8px;
  flex-shrink:0; z-index:200; box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.tb1 { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.brand { display:flex; align-items:center; gap:9px; }
.brand-icon { width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0; }
.brand-name { font-family:'M PLUS Rounded 1c',sans-serif;font-weight:800;font-size:15px;color:var(--text); }
.brand-sub  { font-size:10px;color:var(--text3); }

.loc-btn {
  display:flex;align-items:center;gap:5px;
  background:var(--blue);color:#fff;border:none;border-radius:20px;
  padding:7px 13px;font-size:12px;font-weight:700;font-family:inherit;
  cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;
}
.loc-btn:hover { background:var(--blue-d);box-shadow:0 4px 12px rgba(37,99,235,.3); }
.loc-btn.got    { background:var(--green); }
.loc-btn.loading{ background:var(--text3);pointer-events:none; }

.tb2 { display:flex;gap:7px;align-items:center; }
.searchbox {
  flex:1;display:flex;align-items:center;gap:7px;
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:9px;padding:7px 11px;transition:border-color .15s;
}
.searchbox:focus-within { border-color:var(--blue);background:#fff; }
.searchbox input { background:none;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--text);flex:1; }
.searchbox input::placeholder { color:var(--text3); }

.sort-sel {
  background:var(--bg);border:1.5px solid var(--border);border-radius:9px;
  padding:7px 9px;font-size:12px;font-family:inherit;color:var(--text);
  outline:none;cursor:pointer;white-space:nowrap;
}
.sort-sel:focus { border-color:var(--blue); }

.tb3 { display:flex;gap:5px;overflow-x:auto;padding-bottom:1px; }
.tb3::-webkit-scrollbar { display:none; }
.chip {
  display:flex;align-items:center;gap:3px;
  padding:4px 10px;border-radius:16px;font-size:11px;font-weight:700;
  cursor:pointer;white-space:nowrap;border:1.5px solid;
  transition:opacity .15s,transform .1s;user-select:none;
}
.chip:active { transform:scale(.95); }
.chip.dog   { border-color:#fed7aa;background:#fff7ed;color:#c2410c; }
.chip.cat   { border-color:#fde68a;background:#fffbeb;color:#b45309; }
.chip.small { border-color:#bbf7d0;background:#f0fdf4;color:#166534; }
.chip.large { border-color:#bfdbfe;background:#eff6ff;color:#1e40af; }
.chip.sleep { border-color:#e9d5ff;background:#faf5ff;color:var(--purple); }
.chip:not(.on) { opacity:.38; }
.chip.on { opacity:1; }

/* ── BODY ── */
.body { display:flex;flex:1;overflow:hidden; }

/* ── MAP ── */
.map-wrap { flex:1;position:relative; }
#map { width:100%;height:100%; }

/* Stats pill */
.stat-pill {
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:#fff;border-radius:20px;padding:5px 14px;
  box-shadow:var(--sh);display:flex;gap:12px;align-items:center;
  z-index:10;white-space:nowrap;pointer-events:none;
  border:1px solid var(--border);
}
.sp-item { display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700; }
.sp-dot  { width:7px;height:7px;border-radius:50%; }
.sp-div  { width:1px;height:14px;background:var(--border); }

/* ── SIDE PANEL ── */
.panel {
  width:330px;background:var(--bg);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
.ph { background:#fff;padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0; }
.ph-label { font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.05em; }
.ph-count { font-family:'M PLUS Rounded 1c',sans-serif;font-size:22px;font-weight:800;color:var(--blue); }

.list { flex:1;overflow-y:auto;padding:7px; }
.list::-webkit-scrollbar { width:3px; }
.list::-webkit-scrollbar-thumb { background:#d1d9e0;border-radius:2px; }

.sec-lbl { font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:7px 5px 3px; }

.card {
  background:#fff;border-radius:10px;padding:11px 12px;margin-bottom:5px;
  cursor:pointer;transition:all .15s;border:1.5px solid transparent;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.card:hover { box-shadow:var(--sh);transform:translateY(-1px); }
.card.sel   { border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.card-top   { display:flex;justify-content:space-between;align-items:flex-start;gap:7px;margin-bottom:3px; }
.card-name  { font-size:12.5px;font-weight:700;flex:1;line-height:1.4; }
.pill { font-size:9px;font-weight:700;border-radius:6px;padding:2px 7px;white-space:nowrap;flex-shrink:0; }
.p-open { background:var(--green-l);color:var(--green); }
.p-mid  { background:var(--amber-l);color:var(--amber); }
.p-full { background:var(--red-l);  color:var(--red); }
.card-addr { font-size:10px;color:var(--text2);margin-bottom:5px; }
.card-dist { font-size:11px;font-weight:700;color:var(--blue);margin-bottom:5px; }
.tag-row   { display:flex;gap:3px;flex-wrap:wrap; }
.ctag { font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px; }
.ct-dog   { background:#fff7ed;color:#c2410c; }
.ct-cat   { background:#fffbeb;color:#b45309; }
.ct-small { background:#f0fdf4;color:#166534; }
.ct-large { background:#eff6ff;color:#1e40af; }
.ct-sleep { background:#faf5ff;color:var(--purple); }
.ct-elev  { background:#f0f9ff;color:#0369a1; }

.empty { text-align:center;padding:30px 16px;color:var(--text3);font-size:12px; }

/* ── INFO WINDOW custom styles ── */
.iw { padding:14px 16px;min-width:220px;max-width:260px;font-family:'Noto Sans JP',sans-serif; }
.iw-status { display:flex;align-items:center;gap:5px;margin-bottom:5px; }
.iw-dot  { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
.iw-stlabel { font-size:11px;font-weight:700; }
.iw-name { font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:3px; }
.iw-addr { font-size:10px;color:var(--text2);margin-bottom:5px; }
.iw-dist { font-size:11px;font-weight:700;color:var(--blue);margin-bottom:8px; }
.iw-tags { display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px; }
.iw-tag  { font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px; }
.iw-note { font-size:10px;color:var(--text2);background:var(--bg);border-radius:7px;padding:7px 9px;border-left:2px solid var(--blue);line-height:1.6;margin-bottom:10px; }
.iw-btn  {
  width:100%;background:var(--blue);color:#fff;border:none;
  border-radius:8px;padding:9px;font-size:12px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:background .15s;
}
.iw-btn:hover { background:var(--blue-d); }

/* Google Maps InfoWindow overrides */
.gm-style .gm-style-iw-c {
  padding:0 !important;
  border-radius:14px !important;
  box-shadow:var(--sh-lg) !important;
  border:1px solid var(--border) !important;
}
.gm-style .gm-style-iw-d { overflow:hidden !important; }
.gm-style .gm-style-iw-t::after { display:none !important; }
.gm-style .gm-style-iw-tc { display:none !important; }
.gm-style .gm-ui-hover-effect { top:4px !important; right:4px !important; }

/* Toast */
.toast {
  position:fixed;top:72px;left:50%;transform:translateX(-50%);
  background:#1a2332;color:#fff;border-radius:10px;padding:9px 16px;
  font-size:12px;font-weight:500;z-index:9999;
  box-shadow:var(--sh);pointer-events:none;
  animation:tIn .25s ease;
}
@keyframes tIn { from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)} }

@media(max-width:768px){ .panel{display:none;} }
</style>
</head>
<body>
<div class="app">

    <div class="panel">
      <div class="ph">
        <span class="ph-label">避難所一覧</span>
        <span class="ph-count" id="cnt">—</span>
      </div>
      <div class="list" id="list"></div>
    </div>
  </div>
</div>

// ── GOOGLE MAPS INIT ──
function initMap() {
  gmap = new google.maps.Map(document.getElementById('map'), {
    center: {lat:35.68, lng:139.73},
    zoom: 11,
    mapTypeControl: false,
    fullscreenControl: false,
    streetViewControl: false,
    zoomControlOptions: {
      position: google.maps.ControlPosition.RIGHT_BOTTOM
    },
    styles: [
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'transit',elementType:'labels.icon',stylers:[{visibility:'off'}]},
    ]
  });

  infoWin = new google.maps.InfoWindow({disableAutoPan:false});

  // Close infowindow when clicking map
  gmap.addListener('click', () => {
    infoWin.close();
    if(selId){
      document.getElementById(`c${selId}`)?.classList.remove('sel');
      selId=null;
    }
  });

  renderAll();
}

// ── GEOLOCATION ──
function getLocation(){
  if(!navigator.geolocation){toast('このブラウザは位置情報に対応していません');return;}
  document.getElementById('locTxt').textContent='取得中...';
  document.getElementById('locBtn').className='loc-btn loading';

  navigator.geolocation.getCurrentPosition(pos=>{
    myLat=pos.coords.latitude; myLng=pos.coords.longitude;
    document.getElementById('locTxt').textContent='取得済み ✓';
    document.getElementById('locIco').textContent='✅';
    document.getElementById('locBtn').className='loc-btn got';

    DATA.forEach(s=>s.dist=hav(myLat,myLng,s.lat,s.lng));

    // 現在地マーカー
    if(myMarker) myMarker.setMap(null);
    myMarker = new google.maps.Marker({
      position:{lat:myLat,lng:myLng},
      map:gmap,
      icon:{
        path:google.maps.SymbolPath.CIRCLE,
        scale:8,
        fillColor:'#2563eb',
        fillOpacity:1,
        strokeColor:'#fff',
        strokeWeight:3,
      },
      title:'現在地',
      zIndex:999,
    });

    gmap.panTo({lat:myLat,lng:myLng});
    gmap.setZoom(13);
    document.getElementById('sortSel').value='dist';
    renderAll();
    toast('現在地を取得しました — 近い順に並び替えました');
  },()=>{
    document.getElementById('locTxt').textContent='現在地';
    document.getElementById('locIco').textContent='📍';
    document.getElementById('locBtn').className='loc-btn';
    toast('位置情報の取得に失敗しました');
  },{timeout:8000});
}

function hav(a,b,c,d){
  const R=6371,dl=(c-a)*Math.PI/180,do_=(d-b)*Math.PI/180;
  const x=Math.sin(dl/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(do_/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
const fd=km=>km<1?`${Math.round(km*1000)}m`:`${km.toFixed(1)}km`;

// ── FILTER / SORT ──
function tog(t){
  filters[t]=!filters[t];
  document.getElementById(`chip-${t}`).classList.toggle('on',filters[t]);
  renderAll();
}

function filtered(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  return DATA.filter(s=>{
    if(!['dog','cat','small','large'].some(k=>filters[k]&&s.pets.includes(k))) return false;
    if(filters.sleep&&!s.sleep) return false;
    if(q&&!s.name.includes(q)&&!s.addr.toLowerCase().includes(q)&&!s.ward.includes(q)) return false;
    return true;
  });
}

function srtd(arr){
  const by=document.getElementById('sortSel').value;
  return [...arr].sort((a,b)=>{
    if(by==='dist') return (a.dist??9999)-(b.dist??9999);
    if(by==='ward') return a.ward.localeCompare(b.ward,'ja');
    return a.name.localeCompare(b.name,'ja');
  });
}

// ── RENDER ──
function renderAll(){
  if(document.getElementById('sortSel').value==='dist'&&myLat==null){
    document.getElementById('sortSel').value='name';
    toast('先に「現在地」ボタンを押してください');
  }
  const arr=srtd(filtered());
  renderCards(arr);
  placeMarkers(arr);
  updateStats(arr);
}

function renderCards(arr){
  const el=document.getElementById('list');
  document.getElementById('cnt').textContent=arr.length;
  if(!arr.length){el.innerHTML='<div class="empty">🐾<br>該当する避難所が見つかりません</div>';return;}

  const by=document.getElementById('sortSel').value;
  if(by==='dist'){
    el.innerHTML=arr.map(cardHTML).join('');
  } else {
    el.innerHTML=[
      {k:'open',l:'受入可能'},{k:'mid',l:'残りわずか'},{k:'full',l:'満員・閉鎖'}
    ].map(g=>{
      const it=arr.filter(s=>s.st===g.k);
      return it.length?`<div class="sec-lbl">${g.l}（${it.length}件）</div>`+it.map(cardHTML).join(''):'';
    }).join('');
  }
  arr.forEach(s=>document.getElementById(`c${s.id}`)?.addEventListener('click',()=>pick(s.id)));
}

function cardHTML(s){
  const sm=ST[s.st];
  const tags=[
    ...s.pets.map(p=>PT[p]?`<span class="ctag ${PT[p].c}">${PT[p].l}</span>`:''),
    s.sleep?'<span class="ctag ct-sleep">🌙宿泊可</span>':'',
    s.elev ?'<span class="ctag ct-elev">🛗EV</span>':'',
  ].join('');
  const dist=s.dist!=null?`<div class="card-dist">📍 現在地から ${fd(s.dist)}</div>`:'';
  return `<div class="card${selId===s.id?' sel':''}" id="c${s.id}">
    <div class="card-top"><div class="card-name">${s.name}</div><span class="pill ${sm.pill}">${sm.label}</span></div>
    <div class="card-addr">📍 ${s.addr}</div>${dist}
    <div class="tag-row">${tags}</div>
  </div>`;
}

function updateStats(arr){
  document.getElementById('st-o').textContent=arr.filter(s=>s.st==='open').length;
  document.getElementById('st-m').textContent=arr.filter(s=>s.st==='mid').length;
  document.getElementById('st-f').textContent=arr.filter(s=>s.st==='full').length;
}

// ── MARKERS (Google Maps SVG pins) ──
function placeMarkers(arr){
  Object.values(markers).forEach(m=>m.setMap(null));
  markers={};

  arr.forEach(s=>{
    const color={open:'#16a34a',mid:'#d97706',full:'#dc2626'}[s.st];
    const m=new google.maps.Marker({
      position:{lat:s.lat,lng:s.lng},
      map:gmap,
      icon:{
        path:'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z',
        fillColor:color,
        fillOpacity:1,
        strokeColor:'#fff',
        strokeWeight:1.5,
        scale:1.8,
        anchor:new google.maps.Point(12,22),
      },
      title:s.name,
      zIndex: selId===s.id ? 100 : 1,
    });
    m.addListener('click',()=>pick(s.id));
    markers[s.id]=m;
  });
}

// ── SELECT ──
function pick(id){
  const s=DATA.find(x=>x.id===id); if(!s) return;

  if(selId){
    document.getElementById(`c${selId}`)?.classList.remove('sel');
    if(markers[selId]) markers[selId].setZIndex(1);
  }
  selId=id;
  document.getElementById(`c${id}`)?.classList.add('sel');
  document.getElementById(`c${id}`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  if(markers[id]) markers[id].setZIndex(100);

  gmap.panTo({lat:s.lat,lng:s.lng});

  // InfoWindow content
  const sm=ST[s.st];
  const tags=s.pets.map(p=>PT[p]?`<span class="iw-tag ct-${p}">${PT[p].l}</span>`:'').join('')
    +(s.sleep?'<span class="iw-tag ct-sleep">🌙宿泊可</span>':'')
    +(s.elev ?'<span class="iw-tag ct-elev">🛗EV</span>':'');
  const dist=s.dist!=null?`<div class="iw-dist">📡 現在地から ${fd(s.dist)}</div>`:'';
  const gmUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name+' '+s.addr)}`;

  infoWin.setContent(`<div class="iw">
    <div class="iw-status">
      <div class="iw-dot" style="background:${sm.dot}"></div>
      <span class="iw-stlabel" style="color:${sm.txt}">${sm.label}</span>
    </div>
    <div class="iw-name">${s.name}</div>
    <div class="iw-addr">📍 ${s.addr}</div>
    ${dist}
    <div class="iw-tags">${tags}</div>
    <div class="iw-note">${s.note}</div>
    <button class="iw-btn" onclick="window.open('${gmUrl}','_blank')">🗺 Google マップでルートを確認</button>
  </div>`);
  infoWin.open(gmap, markers[id]);
}

// ── TOAST ──
function toast(msg,dur=2800){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},dur);
}
</script>
